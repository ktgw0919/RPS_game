name: Bug
description: 不具合報告
title: "[fix]: "
labels: ["bug"]
body:
  - type: textarea
    id: repro
    attributes:
      label: 再現手順
      placeholder: |
        1. ルーム作成
        2. 2人参加してゲーム開始
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 実際の動作
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: 環境
      placeholder: Windows / Chrome / backend uvicorn --reload
